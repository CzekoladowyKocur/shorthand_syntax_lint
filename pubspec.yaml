name: shorthand_syntax_lint
description: >-
  Analyzer plugin with granular lint rules and quick fixes for Dart's
  dot-shorthand syntax.
version: 0.1.0

environment:
  sdk: ^3.11.0

dependencies:
  analysis_server_plugin: '>=0.3.15 <0.3.16'
  analyzer: ^13.0.0

dev_dependencies:
  analyzer_testing: ^0.2.6
  lints: ^6.0.0
  test: ^1.25.0
  test_reflective_loader: ^0.4.0
