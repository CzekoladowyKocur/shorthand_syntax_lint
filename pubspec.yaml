name: shorthand_syntax_lint
description: >-
  Analyzer plugin with granular lint rules and quick fixes for Dart's
  dot-shorthand syntax.
version: 0.2.0
repository: https://github.com/CzekoladowyKocur/shorthand_syntax_lint
issue_tracker: https://github.com/CzekoladowyKocur/shorthand_syntax_lint/issues
topics: [lints, analysis, analyzer-plugin]

environment:
  sdk: ^3.11.0

dependencies:
  analysis_server_plugin: ^0.3.20
  analyzer: ^14.1.0
  analyzer_plugin: ^0.14.14

dev_dependencies:
  analyzer_testing: ^0.3.4
  lints: ^6.0.0
  test: ^1.25.0
  test_reflective_loader: ^0.4.0
